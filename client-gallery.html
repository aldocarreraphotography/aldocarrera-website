<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gallery — Aldo Carrera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:       #f5f2ee;
      --paper-soft:  #ece8e3;
      --window:      #faf9f7;
      --rule:        #cdc8c2;
      --rule-soft:   #e0dbd5;
      --ink:         #1a1714;
      --ink-soft:    #4a4845;
      --ink-muted:   #7a7675;
      --accent:      #f6c2cf;
      --accent-soft: rgba(246,194,207,0.18);
      --easing:      cubic-bezier(0.32,0.72,0.24,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--paper); color: var(--ink);
      font-family: "Neue Haas Grotesk Display Pro", "Inter", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px; line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    input, textarea, select { user-select: text; }

    /* ── TOPBAR ────────────────────────────────────────────── */
    .cg-topbar {
      height: 48px; display: flex; align-items: center;
      padding: 0 24px; border-bottom: 1px solid var(--rule);
      background: var(--window);
      gap: 16px;
    }
    .cg-topbar-brand {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-soft); flex: 1;
    }
    .cg-topbar-title {
      font-size: 13px; font-weight: 500; letter-spacing: -0.01em;
    }

    /* ── PIN SCREEN ────────────────────────────────────────── */
    .cg-pin-wrap {
      min-height: calc(100vh - 48px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .cg-pin-card {
      width: 100%; max-width: 340px;
      border: 1px solid var(--rule);
      background: var(--window);
      padding: 44px 36px 40px;
    }
    .cg-pin-eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-muted); margin-bottom: 22px; text-align: center;
    }
    .cg-pin-heading {
      font-size: 22px; font-weight: 500; letter-spacing: -0.018em;
      text-align: center; margin-bottom: 32px; line-height: 1.2;
    }
    .cg-pin-inputs {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 28px;
    }
    .cg-pin-digit {
      width: 54px; height: 60px;
      border: 1px solid var(--rule);
      background: var(--paper);
      font-size: 24px; font-weight: 500; letter-spacing: -0.02em;
      text-align: center; outline: none;
      transition: border-color 140ms var(--easing);
      border-radius: 0;
      -webkit-appearance: none;
      caret-color: var(--accent);
    }
    .cg-pin-digit:focus { border-color: var(--ink); }
    .cg-pin-digit.has-val { border-color: var(--ink-soft); }
    .cg-pin-btn {
      width: 100%;
      height: 46px;
      background: var(--ink); color: var(--paper);
      border: none; cursor: pointer;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      transition: background 140ms var(--easing), opacity 140ms var(--easing);
    }
    .cg-pin-btn:hover:not(:disabled) { background: #2a2420; }
    .cg-pin-btn:disabled { opacity: 0.45; cursor: default; }
    .cg-pin-error {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; color: #b34; text-align: center;
      margin-top: 14px; letter-spacing: 0.03em;
    }

    /* ── GALLERY GRID ──────────────────────────────────────── */
    .cg-gallery-wrap { padding: 28px 24px 60px; }
    .cg-gallery-header {
      display: flex; align-items: baseline; gap: 16px;
      margin-bottom: 24px; padding-bottom: 16px;
      border-bottom: 1px solid var(--rule-soft);
    }
    .cg-gallery-title { font-size: 20px; font-weight: 500; letter-spacing: -0.016em; }
    .cg-gallery-count {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; color: var(--ink-muted); letter-spacing: 0.08em;
    }
    .cg-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    @media (max-width: 700px) { .cg-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px) { .cg-grid { grid-template-columns: 1fr; } }

    .cg-card {
      position: relative; overflow: hidden;
      background: var(--paper-soft); cursor: pointer;
      aspect-ratio: 4/5;
    }
    .cg-card img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      filter: saturate(0.9) contrast(1.01);
      transition: transform 320ms var(--easing), filter 240ms var(--easing);
    }
    .cg-card:hover img { transform: scale(1.025); filter: saturate(1) contrast(1.01); }
    .cg-heart-btn {
      position: absolute; bottom: 10px; right: 10px;
      width: 32px; height: 32px;
      background: rgba(250,249,247,0.80); backdrop-filter: blur(4px);
      border: 1px solid var(--rule);
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px; line-height: 1;
      display: grid; place-items: center;
      transition: background 140ms var(--easing), transform 180ms var(--easing), border-color 140ms var(--easing);
      z-index: 2;
    }
    .cg-heart-btn:hover { transform: scale(1.12); }
    .cg-heart-btn.on { background: rgba(246,194,207,0.90); border-color: #e89aaa; }

    /* ── LIGHTBOX ──────────────────────────────────────────── */
    .cg-lb-scrim {
      position: fixed; inset: 0; z-index: 9000;
      background: #0e0d0c;
      display: flex; flex-direction: column;
    }
    .cg-lb-top {
      height: 44px; display: flex; align-items: center;
      padding: 0 18px; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .cg-lb-filename {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; color: rgba(255,255,255,0.45); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cg-lb-close {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.55); font-size: 22px; line-height: 1;
      width: 32px; height: 32px; display: grid; place-items: center;
      transition: color 140ms;
    }
    .cg-lb-close:hover { color: #fff; }
    .cg-lb-stage {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .cg-lb-stage img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
    }
    .cg-lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); font-size: 22px;
      width: 44px; height: 64px; cursor: pointer;
      transition: background 140ms, color 140ms;
      display: grid; place-items: center;
    }
    .cg-lb-nav:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .cg-lb-prev { left: 14px; }
    .cg-lb-next { right: 14px; }
    .cg-lb-bottom {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 14px 18px;
      display: flex; align-items: flex-start; gap: 14px;
      flex-shrink: 0;
    }
    .cg-lb-heart-big {
      width: 40px; height: 40px; flex-shrink: 0;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      cursor: pointer; font-size: 18px;
      display: grid; place-items: center;
      transition: background 140ms, border-color 140ms;
    }
    .cg-lb-heart-big.on { background: rgba(246,194,207,0.22); border-color: #e89aaa; }
    .cg-lb-note {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75); padding: 9px 12px;
      font-size: 13px; line-height: 1.45;
      resize: none; outline: none; min-height: 40px; max-height: 80px;
      font-family: inherit;
    }
    .cg-lb-note::placeholder { color: rgba(255,255,255,0.25); }
    .cg-lb-note:focus { border-color: rgba(255,255,255,0.22); }
  </style>
</head>
<body>
  <div id="cg-root"></div>
  <script>window.GALLERY_API = 'https://api.aldocarrera.com';</script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/client-gallery.jsx"></script>
</body>
</html>
