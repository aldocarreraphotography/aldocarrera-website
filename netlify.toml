################################################################
# Netlify configuration — aldocarrera.com
#
# • Static public site (index.html + supporting jsx/css/png).
# • Admin SPA at /Admin.html (hash router).
# • Serverless API under /api/* → /functions/*.
################################################################

[build]
  command  = "npm run build"
  publish  = "dist"
  functions = "functions"

[functions]
  node_bundler = "esbuild"
  # All function files live in /functions (Node 18+).
  directory = "functions"

[dev]
  framework = "#static"
  functions = "functions"
  publish   = "dist"
  port      = 8888
  targetPort = 3999

################################################################
# API is now served by the NAS Express server (nas-server/).
# window.API_BASE in Admin.html and index.html points the frontend
# directly to the NAS host — no Netlify functions needed.
################################################################

################################################################
# SPA fallbacks
################################################################

# Admin uses a hash router — any /admin/* path serves Admin.html
[[redirects]]
  from   = "/admin"
  to     = "/Admin.html"
  status = 200
[[redirects]]
  from   = "/admin/*"
  to     = "/Admin.html"
  status = 200

# Clean URLs for client-facing pages
[[redirects]]
  from   = "/gallery"
  to     = "/gallery.html"
  status = 200
[[redirects]]
  from   = "/deck"
  to     = "/deck.html"
  status = 200

################################################################
# Headers
################################################################

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type  = "text/babel; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"
