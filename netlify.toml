################################################################
# Netlify configuration — aldocarrera.com
#
# • Static public site (index.html + supporting jsx/css/png).
# • Admin SPA at /Admin.html (hash router).
# • Serverless API under /api/* → /functions/*.
################################################################

[build]
  command  = "npm run build"
  publish  = "dist"
  functions = "functions"

[functions]
  node_bundler = "esbuild"
  # All function files live in /functions (Node 18+).
  directory = "functions"

[dev]
  framework = "#static"
  functions = "functions"
  publish   = "dist"
  port      = 8888
  targetPort = 3999

################################################################
# /api/* → Netlify Functions
################################################################

# --- Auth ---------------------------------------------------------------
[[redirects]]
  from   = "/api/auth/login"
  to     = "/.netlify/functions/auth-login"
  status = 200
[[redirects]]
  from   = "/api/auth/verify"
  to     = "/.netlify/functions/auth-verify"
  status = 200
[[redirects]]
  from   = "/api/auth/logout"
  to     = "/.netlify/functions/auth-logout"
  status = 200

# --- Public read-only (no auth, edge-cached) ----------------------------
[[redirects]]
  from   = "/api/public/site"
  to     = "/.netlify/functions/public-site"
  status = 200

# Belt-and-braces: never let the CDN cache the public-site response. The
# function sets Cache-Control: no-store already; this header rule is here
# in case any intermediary tries to override it.
[[headers]]
  for = "/api/public/site"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma        = "no-cache"
    Expires       = "0"

# --- Projects (auth required, enforced in function) ---------------------
[[redirects]]
  from   = "/api/projects/:id/images/upload"
  to     = "/.netlify/functions/projects-images-upload?id=:id"
  status = 200
[[redirects]]
  from   = "/api/projects/:id/images/:filename"
  to     = "/.netlify/functions/projects-images?id=:id&filename=:filename"
  status = 200
[[redirects]]
  from   = "/api/projects/:id"
  to     = "/.netlify/functions/projects-id?id=:id"
  status = 200
[[redirects]]
  from   = "/api/projects"
  to     = "/.netlify/functions/projects"
  status = 200

# --- Content ------------------------------------------------------------
[[redirects]]
  from   = "/api/admin/sync"
  to     = "/.netlify/functions/admin-sync"
  status = 200
[[redirects]]
  from   = "/api/about"
  to     = "/.netlify/functions/content-about"
  status = 200
[[redirects]]
  from   = "/api/services/:id"
  to     = "/.netlify/functions/content-services?id=:id"
  status = 200
[[redirects]]
  from   = "/api/services"
  to     = "/.netlify/functions/content-services"
  status = 200
[[redirects]]
  from   = "/api/clients/:slug"
  to     = "/.netlify/functions/content-clients?slug=:slug"
  status = 200
[[redirects]]
  from   = "/api/clients"
  to     = "/.netlify/functions/content-clients"
  status = 200
[[redirects]]
  from   = "/api/settings"
  to     = "/.netlify/functions/content-settings"
  status = 200

################################################################
# SPA fallbacks
################################################################

# Admin uses a hash router — any /admin/* path serves Admin.html
[[redirects]]
  from   = "/admin"
  to     = "/Admin.html"
  status = 200
[[redirects]]
  from   = "/admin/*"
  to     = "/Admin.html"
  status = 200

################################################################
# Headers
################################################################

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type  = "text/babel; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"
