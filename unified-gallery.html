<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Gallery — Aldo Carrera</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>

<!-- Image protection: block right-click + drag on photographs -->
<script>
  document.addEventListener('contextmenu', function (e) {
    if (e.target && e.target.tagName === 'IMG') e.preventDefault();
  }, { capture: true });
  document.addEventListener('dragstart', function (e) {
    if (e.target && e.target.tagName === 'IMG') e.preventDefault();
  }, { capture: true });
</script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap"/>
<!-- Reuse the proven markup/lightbox styles from the legacy gallery -->
<link rel="stylesheet" href="/gallery-styles.css"/>

<style>
  /* ── Unified-gallery-specific chrome (.ug-*) ─────────────── */
  :root {
    --paper:#f5f2ee; --paper-soft:#ece8e3; --window:#faf9f7; --rule:#cdc8c2;
    --rule-soft:#e0dbd5; --ink:#1a1714; --ink-soft:#4a4845; --ink-muted:#7a7675;
    --accent:#d63e5a; --easing:cubic-bezier(.4,0,.2,1);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--paper); color:var(--ink); font-family:'IBM Plex Mono',monospace; min-height:100vh; }

  .ug-topbar { display:flex; align-items:baseline; justify-content:space-between;
    padding:.9rem 1.25rem; border-bottom:1px solid var(--rule); position:sticky; top:0; background:var(--paper); z-index:10; }
  .ug-brand { font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; opacity:.55; }
  .ug-title { font-size:.85rem; font-weight:500; letter-spacing:.02em; }

  .ug-bar { display:flex; align-items:center; justify-content:space-between;
    padding:.8rem 1.25rem; border-bottom:1px solid var(--rule-soft); gap:1rem; flex-wrap:wrap; }
  .ug-count { font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; opacity:.5; }
  .ug-bar-actions { display:flex; gap:.5rem; align-items:center; }
  .ug-btn { background:var(--ink); color:var(--paper); border:none; border-radius:3px;
    font-family:inherit; font-size:.62rem; letter-spacing:.07em; text-transform:uppercase;
    padding:.5rem 1rem; cursor:pointer; transition:opacity .14s; }
  .ug-btn:hover { opacity:.82; } .ug-btn:disabled { opacity:.45; cursor:default; }
  .ug-btn.ghost { background:transparent; color:var(--ink); border:1px solid var(--ink); }
  .ug-btn.ghost:hover { background:var(--ink); color:var(--paper); }

  .ug-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; padding:2px; }
  @media (max-width:760px){ .ug-grid{ grid-template-columns:repeat(2,1fr);} }
  @media (max-width:440px){ .ug-grid{ grid-template-columns:1fr;} }
  .ug-card { position:relative; aspect-ratio:4/5; overflow:hidden; background:var(--paper-soft); cursor:pointer; }
  .ug-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .32s var(--easing); }
  .ug-card:hover img { transform:scale(1.025); }
  .ug-card-badge { position:absolute; top:8px; left:8px; font-size:.55rem; letter-spacing:.1em;
    text-transform:uppercase; padding:.2rem .45rem; border-radius:2px; background:rgba(0,0,0,.6); color:#fff; }
  .ug-card-badge.SELECT { background:#1a6a1a; } .ug-card-badge.ALT { background:#3d5a80; } .ug-card-badge.KILL { background:#7a2a2a; }
  .ug-card-ver { position:absolute; top:8px; right:8px; font-size:.5rem; letter-spacing:.08em;
    background:rgba(0,0,0,.55); color:#fff; padding:.15rem .4rem; border-radius:2px; }
  .ug-card-dl { position:absolute; bottom:8px; right:8px; width:30px; height:30px; border-radius:50%;
    background:rgba(250,249,247,.85); border:1px solid var(--rule); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .18s; }
  .ug-card:hover .ug-card-dl { opacity:1; } @media (hover:none){ .ug-card-dl{ opacity:1; } }

  /* Unlock */
  .ug-unlock-wrap { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .ug-unlock-card { width:100%; max-width:340px; text-align:center; }
  .ug-unlock-eyebrow { font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; opacity:.5; margin-bottom:.6rem; }
  .ug-unlock-title { font-size:1.1rem; font-weight:500; margin-bottom:1.5rem; }
  .ug-pin-inputs { display:flex; gap:.5rem; justify-content:center; margin-bottom:1rem; }
  .ug-pin-inputs input { width:44px; height:54px; text-align:center; font-size:1.3rem; font-family:inherit;
    border:1px solid var(--rule); border-radius:4px; background:var(--window); }
  .ug-pw-input { width:100%; padding:.7rem; font-family:inherit; font-size:.9rem; text-align:center;
    border:1px solid var(--rule); border-radius:4px; background:var(--window); margin-bottom:1rem; }
  .ug-unlock-err { color:var(--accent); font-size:.7rem; margin-top:.8rem; }

  .ug-toast { position:fixed; top:64px; left:50%; transform:translateX(-50%); z-index:9999;
    background:var(--ink); color:var(--paper); font-size:.62rem; letter-spacing:.12em; text-transform:uppercase;
    padding:.6rem 1.1rem; border-radius:3px; }
  .ug-loading,.ug-empty { padding:5rem 1.5rem; text-align:center; font-size:.62rem;
    letter-spacing:.14em; text-transform:uppercase; opacity:.4; }

  /* Version strip in the lightbox panel */
  .ug-vstrip { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.5rem; }
  .ug-vchip { font-size:.55rem; letter-spacing:.06em; padding:.25rem .5rem; border:1px solid var(--rule);
    border-radius:3px; background:var(--window); cursor:pointer; }
  .ug-vchip.main { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* Delivery lightbox = image + download, no panel */
  .ug-deliver-lb { position:fixed; inset:0; background:rgba(0,0,0,.94); z-index:200;
    display:flex; align-items:center; justify-content:center; }
  .ug-deliver-lb img { max-width:92vw; max-height:88vh; object-fit:contain; }
  .ug-deliver-close { position:absolute; top:1rem; right:1.25rem; background:none; border:none;
    color:#fff; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; opacity:.6; }
</style>
</head>
<body>
<div id="ug-root"><div class="ug-loading">—</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script>window.UG_API = window.UG_API || 'https://api.aldocarrera.com';</script>
<script type="text/babel" src="/unified-gallery.jsx"></script>
</body>
</html>
