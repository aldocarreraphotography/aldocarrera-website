<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Deck — Aldo Carrera</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="deck-styles.css"/>
</head>
<body>
<div id="deck"></div>
<script>
(function() {
'use strict';

const API_BASE = window.API_BASE || 'https://api.aldocarrera.com';

/* ------------------------------------------------------------------ */
/* State                                                               */
/* ------------------------------------------------------------------ */
const state = {
  data:    null,   // loaded deck payload
  slides:  [],     // [{type:'cover'|'image'|'back', img?}]
  current: 0,
  total:   0,
};

/* ------------------------------------------------------------------ */
/* Slide construction                                                  */
/* ------------------------------------------------------------------ */
function buildSlides(data) {
  const slides = [{ type: 'cover' }];
  for (const img of data.images) slides.push({ type: 'image', img });
  slides.push({ type: 'back' });
  return slides;
}

/* ------------------------------------------------------------------ */
/* Date formatting                                                     */
/* ------------------------------------------------------------------ */
function fmtDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch { return ''; }
}

/* ------------------------------------------------------------------ */
/* DOM helpers                                                         */
/* ------------------------------------------------------------------ */
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e[k.toLowerCase()] = v;
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
const qs = (s, r) => (r || document).querySelector(s);

/* ------------------------------------------------------------------ */
/* Slide builders                                                      */
/* ------------------------------------------------------------------ */
function buildCover(data) {
  const p = data.project;
  const slide = el('div', { className: 'dk-slide dk-slide-cover' });
  const inner = el('div', { className: 'dk-cover-inner' });

  // Brand header
  const top  = el('div', { className: 'dk-cover-top' });
  const logo = el('div', { className: 'dk-cover-logo' },
    el('img', { src: '/aldo-signature.png', alt: '' }),
  );
  const byline = el('div', { className: 'dk-cover-byline' },
    el('div', { className: 'dk-cover-name' }, 'Aldo Carrera'),
    el('div', { className: 'dk-cover-role' }, 'Photographer · Los Angeles'),
  );
  top.appendChild(logo); top.appendChild(byline);
  inner.appendChild(top);
  inner.appendChild(el('div', { className: 'dk-cover-rule' }));

  // Title
  inner.appendChild(el('h1', { className: 'dk-cover-title' }, data.title || p.name));

  // Meta grid
  const meta = el('div', { className: 'dk-cover-meta' });
  const metaItems = [
    ['Client',   p.client],
    ['Type',     p.type],
    ['Year',     p.year ? String(p.year) : ''],
    ['Location', p.location],
  ].filter(([, v]) => v);
  for (const [label, value] of metaItems) {
    meta.appendChild(el('div', { className: 'dk-cover-meta-item' },
      el('span', { className: 'dk-cover-meta-label' }, label),
      el('span', { className: 'dk-cover-meta-value' }, value),
    ));
  }
  inner.appendChild(meta);

  // Description
  if (p.description) {
    inner.appendChild(el('p', { className: 'dk-cover-desc' }, p.description));
  }

  slide.appendChild(inner);
  return slide;
}

function buildImageSlide(data, img) {
  const slide = el('div', { className: 'dk-slide dk-slide-image' });

  const frame = el('div', { className: 'dk-img-frame' });
  const imgEl = el('img', { src: img.url, alt: img.filename, draggable: 'false' });
  frame.appendChild(imgEl);
  slide.appendChild(frame);

  // Caption bar
  const date = img.exif?.dateTaken ? fmtDate(img.exif.dateTaken) : '';
  slide.appendChild(el('div', { className: 'dk-img-caption' },
    el('span', { className: 'dk-caption-project' }, data.project.id),
    el('span', { className: 'dk-caption-file' },    img.filename),
    el('span', { className: 'dk-caption-date' },    date),
  ));

  return slide;
}

function buildBack(data) {
  const slide = el('div', { className: 'dk-slide dk-slide-back' });
  const p     = data.project;

  const inner = el('div', { className: 'dk-back-inner' });
  inner.appendChild(el('div', { className: 'dk-back-logo' },
    el('img', { src: '/aldo-signature.png', alt: '' }),
  ));
  inner.appendChild(el('h2', { className: 'dk-back-name' }, 'Aldo Carrera'));
  inner.appendChild(el('div', { className: 'dk-back-rule' }));

  const settings = window._deckSettings || {};
  inner.appendChild(el('div', { className: 'dk-back-contact' },
    el('a', { href: 'mailto:aldo@aldocarrera.com' }, 'aldo@aldocarrera.com'),
    el('span', {}, '@aldocarrera'),
    el('a', { href: 'https://aldocarrera.com', target: '_blank', rel: 'noopener' }, 'aldocarrera.com'),
  ));
  inner.appendChild(el('div', { className: 'dk-back-year' }, String(new Date().getFullYear())));

  slide.appendChild(inner);
  return slide;
}

/* ------------------------------------------------------------------ */
/* Render deck                                                         */
/* ------------------------------------------------------------------ */
function render(data) {
  const root = qs('#deck');
  root.innerHTML = '';

  const slides = buildSlides(data);
  state.slides  = slides;
  state.total   = slides.length;

  // Slides container
  const slidesEl = el('div', { className: 'dk-slides', id: 'dk-slides' });
  for (let i = 0; i < slides.length; i++) {
    const s = slides[i];
    let slideEl;
    if (s.type === 'cover')  slideEl = buildCover(data);
    else if (s.type === 'image') slideEl = buildImageSlide(data, s.img);
    else slideEl = buildBack(data);
    slideEl.dataset.idx = i;
    slidesEl.appendChild(slideEl);
  }
  root.appendChild(slidesEl);

  // Chrome overlay
  const chrome = el('div', { className: 'dk-chrome', id: 'dk-chrome' });

  // Logo (top-left) — links back to aldocarrera.com
  const logoChip = el('div', { className: 'dk-logo-chip' },
    el('img', { src: '/aldo-signature.png', alt: 'Aldo Carrera' }),
  );
  chrome.appendChild(el('a', { className: 'dk-close', href: 'https://aldocarrera.com', target: '_blank', rel: 'noopener' }, logoChip));

  // Counter
  chrome.appendChild(el('div', { className: 'dk-counter', id: 'dk-counter' }, ''));

  // Nav arrows
  const prevBtn = el('button', { className: 'dk-nav prev', id: 'dk-prev', onClick: () => go(-1) }, '‹');
  const nextBtn = el('button', { className: 'dk-nav next', id: 'dk-next', onClick: () => go(1)  }, '›');
  chrome.appendChild(prevBtn);
  chrome.appendChild(nextBtn);

  // Progress dots (up to 20; hide if more)
  const dotsEl = el('div', { className: 'dk-dots', id: 'dk-dots' });
  if (slides.length <= 20) {
    for (let i = 0; i < slides.length; i++) {
      const dot = el('div', { className: 'dk-dot', 'data-idx': i, onClick: () => goTo(i) });
      dotsEl.appendChild(dot);
    }
    chrome.appendChild(dotsEl);
  }

  // Hover zones for revealing arrows
  chrome.appendChild(el('div', { className: 'dk-hover-left',  onMouseenter: showNav, onMouseleave: hideNav, onClick: () => go(-1) }));
  chrome.appendChild(el('div', { className: 'dk-hover-right', onMouseenter: showNav, onMouseleave: hideNav, onClick: () => go(1) }));

  root.appendChild(chrome);

  goTo(0, true);
}

/* ------------------------------------------------------------------ */
/* Navigation                                                          */
/* ------------------------------------------------------------------ */
let hideNavTimer = null;

function showNav() {
  clearTimeout(hideNavTimer);
  qsa('.dk-nav').forEach(b => b.classList.add('visible'));
}
function hideNav() {
  hideNavTimer = setTimeout(() => qsa('.dk-nav').forEach(b => b.classList.remove('visible')), 1200);
}
function qsa(sel, root) { return [...(root || document).querySelectorAll(sel)]; }

function go(delta) { goTo(state.current + delta); }

function goTo(idx, instant) {
  if (idx < 0 || idx >= state.total) return;
  const prev = state.current;
  state.current = idx;

  qsa('.dk-slide').forEach((s, i) => {
    s.classList.toggle('active', i === idx);
  });

  // Update counter
  const counter = qs('#dk-counter');
  if (counter) counter.textContent = `${idx + 1} / ${state.total}`;

  // Update dots
  qsa('.dk-dot').forEach(d => {
    const i = parseInt(d.dataset.idx, 10);
    d.classList.toggle('active', i === idx);
  });

  // Update light/dark mode for chrome
  const isLight = state.slides[idx]?.type === 'cover' || state.slides[idx]?.type === 'back';
  const chrome  = qs('#dk-chrome');
  if (chrome) {
    chrome.querySelectorAll('.dk-nav, .dk-dot, .dk-counter, .dk-logo-chip').forEach(e => {
      e.classList.toggle('on-light', isLight);
    });
  }

  // Prev/next disabled state
  const prevBtn = qs('#dk-prev');
  const nextBtn = qs('#dk-next');
  if (prevBtn) prevBtn.disabled = idx === 0;
  if (nextBtn) nextBtn.disabled = idx === state.total - 1;
}

/* ------------------------------------------------------------------ */
/* Input — keyboard + swipe                                            */
/* ------------------------------------------------------------------ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); go(-1); }
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End')  goTo(state.total - 1);
});

// Swipe
let touchX = null, touchY = null;
document.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  touchX = touchY = null;
});

// Click center to advance (but not on interactive elements)
document.addEventListener('click', (e) => {
  if (e.target.closest('.dk-chrome') || e.target.closest('a') || e.target.closest('button')) return;
  go(1);
}, { passive: true });

// Show nav on mouse move
document.addEventListener('mousemove', () => { showNav(); hideNav(); }, { passive: true });

/* ------------------------------------------------------------------ */
/* Boot                                                                */
/* ------------------------------------------------------------------ */
function showLoading() {
  qs('#deck').innerHTML = '';
  // Skeleton mimics cover slide layout
  const wrap = el('div', { style: { position:'fixed', inset:0, background:'#f5f2ee', display:'flex', alignItems:'center', justifyContent:'center' } });
  const inner = el('div', { style: { width:'min(480px,88vw)', display:'flex', flexDirection:'column', gap:0 } });

  // Logo row
  const logoRow = el('div', { style: { display:'flex', alignItems:'center', gap:12, marginBottom:40 } });
  logoRow.appendChild(el('div', { className:'dk-sk-bone', style:{ width:44, height:44, borderRadius:6 } }));
  const byline = el('div', { style:{ display:'flex', flexDirection:'column', gap:6 } });
  byline.appendChild(el('div', { className:'dk-sk-bone', style:{ width:120, height:11 } }));
  byline.appendChild(el('div', { className:'dk-sk-bone', style:{ width:80,  height:9  } }));
  logoRow.appendChild(byline);
  inner.appendChild(logoRow);

  inner.appendChild(el('div', { style:{ height:1, background:'#cdc8c2', marginBottom:28 } }));

  // Title
  inner.appendChild(el('div', { className:'dk-sk-bone', style:{ height:44, width:'90%', marginBottom:12 } }));
  inner.appendChild(el('div', { className:'dk-sk-bone', style:{ height:36, width:'65%', marginBottom:24 } }));

  // Meta grid
  const meta = el('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px 20px' } });
  [[90,70],[75,60],[80,65],[70,55]].forEach(([lw,vw]) => {
    const item = el('div', { style:{ display:'flex', flexDirection:'column', gap:5 } });
    item.appendChild(el('div', { className:'dk-sk-bone', style:{ height:8, width:lw } }));
    item.appendChild(el('div', { className:'dk-sk-bone', style:{ height:11, width:vw } }));
    meta.appendChild(item);
  });
  inner.appendChild(meta);

  wrap.appendChild(inner);
  qs('#deck').appendChild(wrap);
}

function showError(msg) {
  qs('#deck').innerHTML = '';
  qs('#deck').appendChild(
    el('div', { className: 'dk-error' },
      el('div', { className: 'dk-error-icon' }, '✕'),
      el('div', { className: 'dk-error-title' }, 'Deck unavailable'),
      el('div', { className: 'dk-error-sub' }, msg || 'This link may have expired or been removed.'),
    )
  );
}

async function boot() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token') || params.get('t');

  if (!token) { showError('No deck token found in the URL.'); return; }

  showLoading();

  try {
    const r = await fetch(API_BASE + '/api/deck/' + token);
    if (!r.ok) {
      const b = await r.json().catch(() => ({}));
      if (r.status === 404) return showError('Deck not found. Check your link.');
      if (r.status === 410) return showError('This deck link has expired.');
      return showError('Something went wrong.');
    }
    const data = await r.json();
    state.data = data;

    // Update page title
    document.title = `${data.title || data.project.name} — Aldo Carrera`;

    render(data);
  } catch (e) {
    showError('Could not load deck. Please try again.');
    console.error('[deck]', e);
  }
}

boot();
})();
</script>
</body>
</html>
